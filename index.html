<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa do Resort · Brazil Summit FY26</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #F5F5F5;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: #ffffff;
      text-align: center;
      padding: 36px 24px 32px;
      border-bottom: 1px solid #E0E0E0;
    }
    header img {
      max-width: 340px;
      width: 70%;
      display: block;
      margin: 0 auto;
    }

    /* ── MAIN ── */
    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    /* ── MAP ── */
    .map-wrap {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #E0E0E0;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      margin-bottom: 28px;
    }
    .map-wrap img {
      width: 100%;
      display: block;
    }

    /* ── DOWNLOAD BUTTON ── */
    .download-wrap {
      text-align: center;
    }
    .download-wrap a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0A0A0A;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 30px;
      transition: opacity .2s;
    }
    .download-wrap a:hover { opacity: .75; }

    /* ── FOOTER ── */
    footer {
      background: #0A0A0A;
      color: rgba(255,255,255,.4);
      text-align: center;
      padding: 24px 20px;
      font-size: 11px;
      letter-spacing: 1px;
    }
    footer strong { color: rgba(255,255,255,.8); }
  </style>
</head>
<body>

<header>
  <img src="brand.jpg" alt="Thinking Different Together — Brazil Summit FY26" />
</header>

<main>
  <div class="map-wrap">
    <img src="mapa.jpeg" alt="Mapa Interno do Resort" />
  </div>
  <div class="download-wrap">
    <a href="Mapa Interno Resort - ATUALIZADO EM 2022 (2).pdf" download>
      📥 &nbsp;Baixar Mapa em PDF
    </a>
  </div>
</main>

<footer>
  <strong>BRAZIL SUMMIT FY26</strong> &nbsp;·&nbsp; Para informações, dirija-se à recepção do resort.
</footer>

</body>
</html>
